<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>大島小松川公園 — Ojima-Komatsugawa Park</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="park-map.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="intro.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
  const [season, setSeason] = useState(t.season);
  const [lang, setLang] = useState(t.lang);

  useEffect(() => { setSeason(t.season); }, [t.season]);
  useEffect(() => { setLang(t.lang); }, [t.lang]);

  const onSeason = (s) => { setSeason(s); setTweak('season', s); };
  const onLang = (l) => { setLang(l); setTweak('lang', l); };

  return (
    <>
      <Intro/>
      <Header lang={lang} setLang={onLang} season={season}/>
      <Hero lang={lang} season={season} setSeason={onSeason}/>
      <Overview lang={lang}/>
      <Activities lang={lang} season={season}/>
      <MapSection lang={lang} season={season} setSeason={onSeason}/>
      <Facilities lang={lang}/>
      <Events lang={lang}/>
      <History lang={lang}/>
      <Rules lang={lang}/>
      <Access lang={lang}/>
      <Footer lang={lang}/>

      <TweaksPanel>
        <TweakSection label="Language"/>
        <TweakRadio label="Lang" value={lang}
                    options={[{value:'ja',label:'日本語'},{value:'en',label:'EN'}]}
                    onChange={onLang}/>
        <TweakSection label="Season"/>
        <TweakSelect label="Season" value={season}
                    options={[
                      {value:'spring',label:'春 Spring'},
                      {value:'summer',label:'夏 Summer'},
                      {value:'autumn',label:'秋 Autumn'},
                      {value:'winter',label:'冬 Winter'},
                    ]}
                    onChange={onSeason}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
